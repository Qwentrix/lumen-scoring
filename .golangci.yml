run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/Qwentrix/lumen-scoring

issues:
  exclude-rules:
    # Test files are allowed to shadow package-level names.
    - path: "_test\\.go"
      linters:
        - govet
