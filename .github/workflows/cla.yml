name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA
    runs-on: ubuntu-latest
    # Do not run on forks from Dependabot or bots.
    if: >
      github.actor != 'dependabot[bot]' &&
      github.actor != 'github-actions[bot]'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with repo + workflow scope; set at org level so all Qwentrix repos share it.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_PAT }}
        with:
          # Path inside the repo to the file that stores CLA signatures.
          path-to-signatures: ".github/cla-signatures.json"
          # URL of the CLA text that contributors must agree to.
          # TODO: replace placeholder with the published CLA URL once Legal finalises it.
          path-to-document: "https://cla.qwentrix.com/individual"
          # GitHub handles of contributors who are pre-approved (e.g., Qwentrix employees).
          # Comma-separated, no spaces.
          allowlist: "bot*,*[bot],qwentrix-*"
          branch: "main"
          # Message posted on PRs when the CLA has not yet been signed.
          custom-notsigned-prcomment: |
            Thank you for your pull request!

            Before we can merge it, you must sign the [Qwentrix Individual CLA](https://cla.qwentrix.com/individual).

            Please click **I have read the CLA Document and I hereby sign the CLA** in the CLA bot's comment above.

            If you are contributing on behalf of your employer, your company must also sign the [Corporate CLA](https://cla.qwentrix.com/corporate). Contact legal@qwentrix.com to arrange that.
          # Message posted after the CLA is signed successfully.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
